[string-mod-setting]
texugo-wind-mode-CLASSICAL=classic
texugo-wind-mode-SURFACE=surface
texugo-wind-mode-SURFACE+PRESSURE=surface + pressure

[string-mod-setting-description]
texugo-wind-mode-CLASSICAL=Use the original (periodic) function, the same value applies to all surfaces
texugo-wind-mode-SURFACE=Each surface has its own (random) wind strength
texugo-wind-mode-SURFACE+PRESSURE=Every surface has its own (random) wind strength. Power is proportional to atmospheric pressure (increases at higher pressure and decreases at lower pressure).

