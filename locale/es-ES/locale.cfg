[mod-setting-description]
texugo-wind-power=Multiplicador de producción de energía\nPredeterminado: 1 = 40/400/4000/40000 kW
texugo-wind-turbine4=Permitir la desactivación de la turbina eólica gigante para computadoras de gama baja donde los gráficos grandes podrían causar problemas
texugo-wind-extended-collision-area=Si está activado, el espacio detrás de las turbinas eólicas está reservado para que no se pueda construir nada allí
texugo-wind-mode=Modo en que se determina la fuerza del viento
texugo-wind-expensive-recipes=La construcción de las turbinas requiere más recursos.

[string-mod-setting]
texugo-wind-mode-CLASSICAL=tradicional
texugo-wind-mode-SURFACE=superficie
texugo-wind-mode-SURFACE+PRESSURE=superficie + presión

[string-mod-setting-description]
texugo-wind-mode-CLASSICAL=Utilice la función original (periódica), el mismo valor se aplica a todas las superficies
texugo-wind-mode-SURFACE=Utilice la función original (periódica), el mismo valor se aplica a todas las superficies
texugo-wind-mode-SURFACE+PRESSURE=Cada superficie tiene su propia fuerza de viento (aleatoria). La producción de energía se ve influenciada por la presión atmosférica (aumenta a mayor presión y disminuye a menor).

