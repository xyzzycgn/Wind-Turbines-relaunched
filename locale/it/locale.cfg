[mod-setting-description]
texugo-wind-power=Moltiplicatore di produzione di energia\nDefault: 1 = 40/400/4000/40000 kW
texugo-wind-turbine4=Consenti la disattivazione della turbina eolica gigante per computer di fascia bassa in cui la grafica di grandi dimensioni potrebbe causare problemi
texugo-wind-extended-collision-area=Se abilitata, lo spazio dietro le turbine viene riservato, impedendo la costruzione.
texugo-wind-mode=Modalità con cui viene determinata la forza del vento
texugo-wind-expensive-recipes=La costruzione delle turbine richiede più risorse

[string-mod-setting]
texugo-wind-mode-CLASSICAL=classico
texugo-wind-mode-SURFACE=superficie
texugo-wind-mode-SURFACE+PRESSURE=superficie + pressione

[string-mod-setting-description]
texugo-wind-mode-CLASSICAL=Utilizzare la funzione originale (periodica), lo stesso valore si applica a tutte le superfici
texugo-wind-mode-SURFACE=Ogni superficie ha la sua forza del vento (casuale)
texugo-wind-mode-SURFACE+PRESSURE=Ogni superficie ha la sua intensità del vento (casuale). La resa energetica è influenzata dalla pressione atmosferica (aumenta con una pressione più alta e diminuisce con una pressione più bassa).

[alerts]
texugo-wind-extended-collision-area=Ha dovuto essere smontato a causa di un conflitto di distanza con un altro oggetto.
texugo-wind-not-connected=Non collegato a nessuna rete elettrica.
texugo-wind-mode-set=Modalità vento impostata su __1__
