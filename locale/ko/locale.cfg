[string-mod-setting]
texugo-wind-mode-CLASSICAL=클래식
texugo-wind-mode-SURFACE=표면
texugo-wind-mode-SURFACE+PRESSURE=표면 + 압력

[string-mod-setting-description]
texugo-wind-mode-CLASSICAL=원래의 (주기적) 함수를 사용하면 모든 표면에 동일한 값이 적용됩니다.
texugo-wind-mode-SURFACE=각 표면에는 고유한 (무작위) 바람 강도가 있습니다.
texugo-wind-mode-SURFACE+PRESSURE=모든 표면에는 고유한 (무작위적인) 바람 세기가 있습니다. 출력은 대기압에 비례합니다(기압이 높을수록 증가하고 기압이 낮을수록 감소).

[alerts]
texugo-wind-mode-set=바람 모드가 __1__로 설정되었습니다
