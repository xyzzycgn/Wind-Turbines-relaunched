[string-mod-setting-description]
texugo-wind-mode-CLASSICAL=Użyj oryginalnej (okresowej) funkcji, ta sama wartość dotyczy wszystkich powierzchni
texugo-wind-mode-SURFACE=Każda powierzchnia ma swoją własną (losową) siłę wiatru
texugo-wind-mode-SURFACE+PRESSURE=Każda powierzchnia ma swoją własną (losową) siłę wiatru. Wydajność energetyczna zależy od ciśnienia atmosferycznego (rośnie przy wyższym ciśnieniu i maleje przy niższym ciśnieniu).

