[mod-setting-name]
texugo-wind-power=风力强度系数
texugo-wind-turbine4=启用巨型风力涡轮机
texugo-wind-extended-collision-area=风力涡轮机占用更多空间
texugo-wind-mode=风力强度模式
texugo-wind-expensive-recipes=更高的建造成本

[mod-setting-description]
texugo-wind-power=能量产出倍率\n默认：1 = 40/400/4000/40000 kW
texugo-wind-turbine4=可在低端电脑上禁用，以免大型图形造成问题
texugo-wind-extended-collision-area=启用后，风力涡轮机后方的空间将被保留，无法在此建造任何东西
texugo-wind-mode=风力强度的确定方式
texugo-wind-expensive-recipes=建造风力涡轮机需要更多资源

[string-mod-setting]
texugo-wind-mode-CLASSICAL=经典
texugo-wind-mode-SURFACE=地表
texugo-wind-mode-SURFACE+PRESSURE=地表+压力

[string-mod-setting-description]
texugo-wind-mode-CLASSICAL=使用原始的（周期性）函数，所有地表使用相同的值
texugo-wind-mode-SURFACE=每个地表都有自己的（随机）风力强度
texugo-wind-mode-SURFACE+PRESSURE=每个地表都有自己的（随机）风力强度。功率与大气压力成正比（压力越高，功率越高；压力越低，功率越低）。

[alerts]
texugo-wind-extended-collision-area=因与其他物体重叠而被拆除
texugo-wind-not-connected=未连接到任何电网
texugo-wind-mode-set=风力模式已设为__1__
