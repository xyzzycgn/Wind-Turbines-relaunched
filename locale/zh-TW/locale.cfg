[mod-setting-name]
texugo-wind-power=風力強度係數
texugo-wind-turbine4=啟用巨型風力渦輪機
texugo-wind-extended-collision-area=風力渦輪機佔用更多空間
texugo-wind-mode=風力強度模式
texugo-wind-expensive-recipes=更高的建造成本

[mod-setting-description]
texugo-wind-power=能量產出倍率\n預設：1 = 40/400/4000/40000 kW
texugo-wind-turbine4=可在低階電腦上停用，以免大型圖形造成問題
texugo-wind-extended-collision-area=啟用後，風力渦輪機後方的空間將被保留，無法在此建造任何東西
texugo-wind-mode=風力強度的決定方式
texugo-wind-expensive-recipes=建造風力渦輪機需要更多資源

[string-mod-setting]
texugo-wind-mode-CLASSICAL=經典
texugo-wind-mode-SURFACE=地表
texugo-wind-mode-SURFACE+PRESSURE=地表+壓力

[string-mod-setting-description]
texugo-wind-mode-CLASSICAL=使用原始的（週期性）函數，所有地表使用相同的值
texugo-wind-mode-SURFACE=每個地表都有自己的（隨機）風力強度
texugo-wind-mode-SURFACE+PRESSURE=每個地表都有自己的（隨機）風力強度。功率與大氣壓力成正比（壓力越高，功率越高；壓力越低，功率越低）。

[alerts]
texugo-wind-extended-collision-area=因與其他物體重疊而被拆除
texugo-wind-not-connected=未連接到任何電網
texugo-wind-mode-set=風力模式已設為__1__
